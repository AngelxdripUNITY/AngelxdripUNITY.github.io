<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Memory & Training</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Tabs */
        .tab {
            display: inline-block;
            padding: 10px 20px;
            background-color: #ccc;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        .tab.active {
            background-color: #4CAF50;
            color: white;
        }

        /* Content Areas */
        .tab-content {
            display: none;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            margin-top: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin: 10px 0;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .loading {
            display: none;
            font-size: 18px;
            color: #999;
        }

        .feedback {
            margin-top: 20px;
            color: #007b00;
        }

        .response-container {
            margin-top: 20px;
        }

        .response-card {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .response-card div {
            margin-top: 10px;
        }

        .word-card {
            background-color: #e0f7fa;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .word-card button {
            margin: 5px;
        }

        .memory-list {
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>AI Memory & Training</h1>

        <!-- Tab navigation -->
        <div>
            <div class="tab active" onclick="showTab('chat')">Chat</div>
            <div class="tab" onclick="showTab('train')">Train</div>
            <div class="tab" onclick="showTab('memory')">Memory</div>
        </div>

        <!-- Chat Tab -->
        <div id="chatTab" class="tab-content active">
            <div class="input-group">
                <label for="userInput">Talk to the AI:</label>
                <input type="text" id="userInput" placeholder="Ask the AI something..." />
                <button onclick="generateResponse()">Send</button>
            </div>

            <div id="responsePreview"></div>
            <div class="response-container" id="responseContainer"></div>

            <div id="loading" class="loading">Training in progress...</div>
        </div>

        <!-- Training Tab -->
        <div id="trainTab" class="tab-content">
            <h2>Train the AI</h2>

            <div class="input-group">
                <label for="keyword">Keywords (comma separated):</label>
                <input type="text" id="keyword" placeholder="Enter keywords" />
            </div>

            <div class="input-group">
                <label for="response">Responses (comma separated):</label>
                <textarea id="response" placeholder="Enter responses"></textarea>
            </div>

            <div class="input-group">
                <label for="definition">Definition (optional):</label>
                <textarea id="definition" placeholder="Enter definition (optional)"></textarea>
            </div>

            <div class="input-group">
                <label for="bias">Bias (default: 1):</label>
                <input type="number" id="bias" value="1" min="0" />
            </div>

            <button onclick="trainAI()">Train</button>
            <button onclick="saveTraining()">Save Training</button>
            <button onclick="loadTraining()">Load Training</button>

            <hr>

        </div>

        <!-- Memory Tab -->
        <div id="memoryTab" class="tab-content">
            <h2>AI Memory</h2>
            <div id="memoryList" class="memory-list"></div>

            <button onclick="exportMemory()">Export Memory</button>
            <input type="file" id="importFile" onchange="importMemory(event)" style="display:none" />
            <button onclick="document.getElementById('importFile').click()">Import Memory</button>
        </div>

        <div id="trainingFeedback" class="feedback"></div>
    </div>

    <script>
        const aiMemory = {
            words: {}, // Stores definitions, responses, and bias
            phrases: {}, // Stores multi-word phrases
        };

        // Show the appropriate tab
        function showTab(tab) {
            const chatTab = document.getElementById("chatTab");
            const trainTab = document.getElementById("trainTab");
            const memoryTab = document.getElementById("memoryTab");
            const chatTabButton = document.querySelector('.tab:nth-child(1)');
            const trainTabButton = document.querySelector('.tab:nth-child(2)');
            const memoryTabButton = document.querySelector('.tab:nth-child(3)');

            if (tab === 'chat') {
                chatTab.classList.add("active");
                trainTab.classList.remove("active");
                memoryTab.classList.remove("active");
                chatTabButton.classList.add("active");
                trainTabButton.classList.remove("active");
                memoryTabButton.classList.remove("active");
            } else if (tab === 'train') {
                chatTab.classList.remove("active");
                trainTab.classList.add("active");
                memoryTab.classList.remove("active");
                chatTabButton.classList.remove("active");
                trainTabButton.classList.add("active");
                memoryTabButton.classList.remove("active");
            } else if (tab === 'memory') {
                chatTab.classList.remove("active");
                trainTab.classList.remove("active");
                memoryTab.classList.add("active");
                chatTabButton.classList.remove("active");
                trainTabButton.classList.remove("active");
                memoryTabButton.classList.add("active");
                displayMemory();
            }
        }

        // Generate a response after the AI is trained
        function generateResponse() {
            const userInput = document.getElementById("userInput").value.toLowerCase();
            const responsePreview = document.getElementById("responsePreview");

            if (!userInput) {
                responsePreview.innerHTML = "Please say something.";
                return;
            }

            let bestMatch = null;
            let highestConfidence = 0;

            // Find the best match, considering bias and context
            Object.keys(aiMemory.words).forEach((keywords) => {
                const keywordList = keywords.split(",").map(word => word.trim().toLowerCase());
                if (keywordList.some(keyword => userInput.includes(keyword))) {
                    const confidence = aiMemory.words[keywords].bias;
                    if (confidence > highestConfidence) {
                        bestMatch = keywords;
                        highestConfidence = confidence;
                    }
                }
            });

            // Check for phrase matches
            Object.keys(aiMemory.phrases).forEach((phrase) => {
                if (userInput.includes(phrase)) {
                    bestMatch = phrase;
                    highestConfidence = aiMemory.phrases[phrase].bias;
                }
            });

            if (bestMatch) {
                const responses = aiMemory.words[bestMatch] ? aiMemory.words[bestMatch].responses : aiMemory.phrases[bestMatch].responses;
                displayMixedResponses(responses, bestMatch, highestConfidence);
            } else {
                responsePreview.innerHTML = "I don't understand. Can you train me?";
            }
        }

        // Show the best mixed responses with feedback options
        function displayMixedResponses(responses, keyword, confidence) {
            const responseContainer = document.getElementById("responseContainer");
            responseContainer.innerHTML = ""; // Clear previous responses

            // Randomly pick one response
            const randomIndex = Math.floor(Math.random() * responses.length);
            const selectedResponse = responses[randomIndex];

            const responseCard = document.createElement("div");
            responseCard.className = "response-card";
            responseCard.innerHTML = `
                <p>${selectedResponse}</p>
                <div>
                    <button onclick="likeResponse('${keyword}', ${randomIndex})">👍 Like</button>
                    <button onclick="dislikeResponse('${keyword}', ${randomIndex})">👎 Dislike</button>
                    <button onclick="editResponse('${keyword}', ${randomIndex})">✏️ Edit</button>
                </div>
            `;
            responseContainer.appendChild(responseCard);

            // Show confidence score
            const responsePreview = document.getElementById("responsePreview");
            responsePreview.innerHTML = `<strong>Confidence:</strong> ${confidence.toFixed(2)}`;
        }

        // Training AI with multiple keywords, responses, and bias
        function trainAI() {
            const keywordsInput = document.getElementById("keyword").value;
            const responseInput = document.getElementById("response").value;
            const bias = parseInt(document.getElementById("bias").value) || 1;
            const definition = document.getElementById("definition").value;

            if (!keywordsInput || !responseInput) {
                alert("Please provide keywords and responses.");
                return;
            }

            document.getElementById("loading").style.display = "block"; // Show loading spinner

            const keywords = keywordsInput.split(",").map(keyword => keyword.trim().toLowerCase());
            const responses = responseInput.split(",").map(response => response.trim());

            keywords.forEach(keyword => {
                if (!aiMemory.words[keyword]) {
                    aiMemory.words[keyword] = {
                        definitions: "",
                        responses: [],
                        bias: 1
                    };
                }
                aiMemory.words[keyword].responses = aiMemory.words[keyword].responses.concat(responses);
                aiMemory.words[keyword].definitions = definition;
                aiMemory.words[keyword].bias = bias;
            });

            document.getElementById("loading").style.display = "none"; // Hide loading spinner
            document.getElementById("trainingFeedback").innerText = "AI trained successfully!";
            setTimeout(() => {
                document.getElementById("trainingFeedback").innerText = ""; // Clear feedback after a few seconds
            }, 3000);

            // Auto save after training
            saveTraining();
        }

        // Saving the training data to localStorage
        function saveTraining() {
            localStorage.setItem("aiMemory", JSON.stringify(aiMemory));
        }

        // Load training data from localStorage
        function loadTraining() {
            const savedData = localStorage.getItem("aiMemory");
            if (savedData) {
                aiMemory.words = JSON.parse(savedData).words;
            }
        }

        // Export memory as a JSON file
        function exportMemory() {
            const blob = new Blob([JSON.stringify(aiMemory, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'brain.json';
            link.click();
        }

        // Import memory from a JSON file
        function importMemory(event) {
            const file = event.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                aiMemory.words = data.words;
                displayMemory();
                saveTraining(); // Save after import
            };

            reader.readAsText(file);
        }

        // Display the memory in the "Memory" tab
        function displayMemory() {
            const memoryList = document.getElementById("memoryList");
            memoryList.innerHTML = ""; // Clear previous memory list

            Object.keys(aiMemory.words).forEach((keywords) => {
                const wordCard = document.createElement("div");
                wordCard.className = "word-card";

                wordCard.innerHTML = `
                    <strong>${keywords}</strong>
                    <p><b>Definition:</b> <span id="def-${keywords}">${aiMemory.words[keywords].definitions}</span></p>
                    <p><b>Bias:</b> <span id="bias-${keywords}">${aiMemory.words[keywords].bias}</span></p>
                    <p><b>Responses:</b> <span id="responses-${keywords}">${aiMemory.words[keywords].responses.join(", ")}</span></p>
                    <button onclick="editMemory('${keywords}')">Edit</button>
                    <button onclick="deleteMemory('${keywords}')">Delete</button>
                `;

                memoryList.appendChild(wordCard);
            });
        }

        // Edit a word's memory
        function editMemory(keywords) {
            const defSpan = document.getElementById(`def-${keywords}`);
            const biasSpan = document.getElementById(`bias-${keywords}`);
            const respSpan = document.getElementById(`responses-${keywords}`);
            const editButton = event.target;
            
            // Toggle to 'done' and make fields editable
            if (editButton.innerText === "Edit") {
                defSpan.contentEditable = "true";
                biasSpan.contentEditable = "true";
                respSpan.contentEditable = "true";
                editButton.innerText = "Done";
            } else {
                defSpan.contentEditable = "false";
                biasSpan.contentEditable = "false";
                respSpan.contentEditable = "false";
                editButton.innerText = "Edit";

                // Save edited memory
                aiMemory.words[keywords].definitions = defSpan.innerText;
                aiMemory.words[keywords].bias = parseInt(biasSpan.innerText);
                aiMemory.words[keywords].responses = respSpan.innerText.split(",");
                saveTraining();
            }
        }

        // Delete a word's memory
        function deleteMemory(keywords) {
            delete aiMemory.words[keywords];
            saveTraining();
            displayMemory();
        }

        // Load memory when the page is ready
        loadTraining();
    </script>

</body>
</html>
