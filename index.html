<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Memory & Training</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Tabs */
        .tab {
            display: inline-block;
            padding: 10px 20px;
            background-color: #ccc;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        .tab.active {
            background-color: #4CAF50;
            color: white;
        }

        /* Content Areas */
        .tab-content {
            display: none;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            margin-top: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin: 10px 0;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .loading {
            display: none;
            font-size: 18px;
            color: #999;
        }

        .feedback {
            margin-top: 20px;
            color: #007b00;
        }

        .response-container {
            margin-top: 20px;
        }

        .response-card {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .response-card div {
            margin-top: 10px;
        }

        .word-card {
            background-color: #e0f7fa;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .word-card button {
            margin: 5px;
        }

        .memory-list {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Memory & Training</h1>

        <!-- Tab navigation -->
        <div>
            <div class="tab active" onclick="showTab('chat')">Chat</div>
            <div class="tab" onclick="showTab('train')">Train</div>
            <div class="tab" onclick="showTab('memory')">Memory</div>
        </div>

        <!-- Chat Tab -->
        <div id="chatTab" class="tab-content active">
            <div class="input-group">
                <label for="userInput">Talk to the AI:</label>
                <input type="text" id="userInput" placeholder="Ask the AI something..." />
                <button onclick="generateResponse()">Send</button>
            </div>

            <div id="responsePreview"></div>
            <div class="response-container" id="responseContainer"></div>

            <div id="loading" class="loading">Training in progress...</div>
        </div>

        <!-- Training Tab -->
        <div id="trainTab" class="tab-content">
            <h2>Train the AI</h2>

            <div class="input-group">
                <label for="keyword">Keyword:</label>
                <input type="text" id="keyword" placeholder="Enter keyword" />
            </div>

            <div class="input-group">
                <label for="response">Response:</label>
                <textarea id="response" placeholder="Enter response"></textarea>
            </div>

            <div class="input-group">
                <label for="definition">Definition (optional):</label>
                <textarea id="definition" placeholder="Enter definition (optional)"></textarea>
            </div>

            <div class="input-group">
                <label for="bias">Bias (default: 1):</label>
                <input type="number" id="bias" value="1" min="0" />
            </div>

            <button onclick="trainAI()">Train</button>
            <button onclick="saveTraining()">Save Training</button>
            <button onclick="loadTraining()">Load Training</button>

            <hr>

        </div>

        <!-- Memory Tab -->
        <div id="memoryTab" class="tab-content">
            <h2>AI Memory</h2>
            <div id="memoryList" class="memory-list"></div>
        </div>

        <div id="trainingFeedback" class="feedback"></div>
    </div>

    <script>
        const aiMemory = {
            words: {}, // Stores definitions, responses, and bias
        };

        // Show the appropriate tab
        function showTab(tab) {
            const chatTab = document.getElementById("chatTab");
            const trainTab = document.getElementById("trainTab");
            const memoryTab = document.getElementById("memoryTab");
            const chatTabButton = document.querySelector('.tab:nth-child(1)');
            const trainTabButton = document.querySelector('.tab:nth-child(2)');
            const memoryTabButton = document.querySelector('.tab:nth-child(3)');

            if (tab === 'chat') {
                chatTab.classList.add("active");
                trainTab.classList.remove("active");
                memoryTab.classList.remove("active");
                chatTabButton.classList.add("active");
                trainTabButton.classList.remove("active");
                memoryTabButton.classList.remove("active");
            } else if (tab === 'train') {
                chatTab.classList.remove("active");
                trainTab.classList.add("active");
                memoryTab.classList.remove("active");
                chatTabButton.classList.remove("active");
                trainTabButton.classList.add("active");
                memoryTabButton.classList.remove("active");
            } else if (tab === 'memory') {
                chatTab.classList.remove("active");
                trainTab.classList.remove("active");
                memoryTab.classList.add("active");
                chatTabButton.classList.remove("active");
                trainTabButton.classList.remove("active");
                memoryTabButton.classList.add("active");
                displayMemory();
            }
        }

        // Generate a response after the AI is trained
        function generateResponse() {
            const userInput = document.getElementById("userInput").value.toLowerCase();
            const responsePreview = document.getElementById("responsePreview");

            if (!userInput) {
                responsePreview.innerHTML = "Please say something.";
                return;
            }

            let bestMatch = null;
            let highestConfidence = 0;

            // Find the best match, considering bias and context
            Object.keys(aiMemory.words).forEach((keyword) => {
                const similarity = calculateSimilarity(userInput, keyword);
                const confidence = similarity * aiMemory.words[keyword].bias;

                if (confidence > highestConfidence) {
                    bestMatch = keyword;
                    highestConfidence = confidence;
                }
            });

            if (bestMatch) {
                const responses = aiMemory.words[bestMatch].responses;
                displayMixedResponses(responses, bestMatch, highestConfidence);
            } else {
                responsePreview.innerHTML = "I don't understand. Can you train me?";
            }
        }

        // Show the best mixed responses with feedback options
        function displayMixedResponses(responses, keyword, confidence) {
            const responseContainer = document.getElementById("responseContainer");
            responseContainer.innerHTML = ""; // Clear previous responses

            responses.forEach((response, index) => {
                const responseCard = document.createElement("div");
                responseCard.className = "response-card";

                responseCard.innerHTML = `
                    <p>${response.text}</p>
                    <div>
                        <button onclick="likeResponse('${keyword}', ${index})">👍 Like</button>
                        <button onclick="dislikeResponse('${keyword}', ${index})">👎 Dislike</button>
                        <button onclick="editResponse('${keyword}', ${index})">✏️ Edit</button>
                    </div>
                `;

                responseContainer.appendChild(responseCard);
            });

            // Show confidence score
            const responsePreview = document.getElementById("responsePreview");
            responsePreview.innerHTML = `<strong>Confidence:</strong> ${confidence.toFixed(2)}`;
        }

        // Training AI with a keyword, response, and bias
        function trainAI() {
            const keyword = document.getElementById("keyword").value.toLowerCase();
            const response = document.getElementById("response").value;
            const bias = parseInt(document.getElementById("bias").value) || 1;
            const definition = document.getElementById("definition").value;

            if (!keyword || !response) {
                alert("Please provide a keyword and response.");
                return;
            }

            document.getElementById("loading").style.display = "block"; // Show loading spinner

            if (!aiMemory.words[keyword]) {
                aiMemory.words[keyword] = {
                    definitions: "",
                    responses: [],
                    bias: 1
                };
            }

            aiMemory.words[keyword].responses.push({ text: response, bias });
            aiMemory.words[keyword].definitions = definition;
            aiMemory.words[keyword].bias = bias;

            document.getElementById("loading").style.display = "none"; // Hide loading spinner
            document.getElementById("trainingFeedback").innerText = "AI trained successfully!";
            setTimeout(() => {
                document.getElementById("trainingFeedback").innerText = ""; // Clear feedback after a few seconds
            }, 3000);

            // Auto save after training
            saveTraining();
        }

        // Saving the training data to localStorage
        function saveTraining() {
            localStorage.setItem("aiMemory", JSON.stringify(aiMemory));
        }

        // Load training data from localStorage
        function loadTraining() {
            const savedData = localStorage.getItem("aiMemory");
            if (savedData) {
                aiMemory.words = JSON.parse(savedData).words;
            }
        }

        // Display the memory in the "Memory" tab
        function displayMemory() {
            const memoryList = document.getElementById("memoryList");
            memoryList.innerHTML = ""; // Clear previous memory list

            Object.keys(aiMemory.words).forEach((keyword) => {
                const wordCard = document.createElement("div");
                wordCard.className = "word-card";

                wordCard.innerHTML = `
                    <strong>${keyword}</strong>
                    <p><b>Definition:</b> ${aiMemory.words[keyword].definitions}</p>
                    <p><b>Bias:</b> ${aiMemory.words[keyword].bias}</p>
                    <p><b>Responses:</b> ${aiMemory.words[keyword].responses.map(response => response.text).join(", ")}</p>
                    <button onclick="editMemory('${keyword}')">Edit</button>
                `;

                memoryList.appendChild(wordCard);
            });
        }

        // Edit a word's memory
        function editMemory(keyword) {
            const newDefinition = prompt("Enter new definition for the word:", aiMemory.words[keyword].definitions);
            const newBias = prompt("Enter new bias for the word:", aiMemory.words[keyword].bias);

            aiMemory.words[keyword].definitions = newDefinition || aiMemory.words[keyword].definitions;
            aiMemory.words[keyword].bias = parseInt(newBias) || aiMemory.words[keyword].bias;

            saveTraining(); // Save changes to localStorage
            displayMemory(); // Update the memory display
        }

        // Like response (increase bias)
        function likeResponse(keyword, index) {
            aiMemory.words[keyword].responses[index].bias += 1;
            saveTraining();
            generateResponse(); // Update the response
        }

        // Dislike response (decrease bias)
        function dislikeResponse(keyword, index) {
            aiMemory.words[keyword].responses[index].bias -= 1;
            saveTraining();
            generateResponse(); // Update the response
        }

        // Edit response text
        function editResponse(keyword, index) {
            const newResponse = prompt("Edit the response:", aiMemory.words[keyword].responses[index].text);
            if (newResponse !== null) {
                aiMemory.words[keyword].responses[index].text = newResponse;
                saveTraining();
                generateResponse(); // Update the response
            }
        }

        // Calculate similarity between two strings (basic example)
        function calculateSimilarity(str1, str2) {
            const commonWords = str1.split(" ").filter(word => str2.includes(word)).length;
            return commonWords / Math.max(str1.split(" ").length, str2.split(" ").length);
        }

        // Start by loading saved training data
        loadTraining();
    </script>

</body>
</html>
