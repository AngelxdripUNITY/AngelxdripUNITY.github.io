<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Icon Password Selector</title>
  <!-- Using Montserrat font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #6b73ff, #000dff);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      margin: 30px 0;
      text-align: center;
      color: #fff;
    }
    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    header p {
      font-size: 1.1rem;
    }
    /* Container for the content */
    .container {
      background: #fff;
      padding: 20px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
      max-width: 800px;
      width: 90%;
    }
    /* Icon Grid Styles */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 15px;
      margin: 20px auto;
    }
    .icon {
      width: 80px;
      height: 80px;
      cursor: pointer;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 5px;
      background-color: #fafafa;
      transition: transform 0.2s, border-color 0.2s;
    }
    .icon:hover {
      transform: scale(1.1);
      border-color: #6b73ff;
    }
    /* Selected Icons Display */
    .selected-icons {
      margin: 20px auto;
      padding: 15px;
      border: 2px dashed #6b73ff;
      border-radius: 10px;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .selected-icons img {
      border: 2px solid #ddd;
      border-radius: 5px;
    }
    /* Reset Button Styles */
    button {
      padding: 12px 25px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background-color: #6b73ff;
      color: #fff;
      border-radius: 5px;
      transition: background-color 0.3s;
      margin-top: 20px;
    }
    button:hover {
      background-color: #000dff;
    }
    /* Responsive adjustments */
    @media (max-width: 600px) {
      .icon {
        width: 60px;
        height: 60px;
      }
      .selected-icons img {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Minecraft Icon Password Selector</h1>
    <p>Select a 4-icon password by clicking the icons below</p>
  </header>
  <div class="container">
    <div class="icon-grid" id="iconGrid">
      <!-- Icons will be dynamically loaded here -->
    </div>

    <div class="selected-icons" id="selectedIcons">
      <strong>Selected Password:</strong>
      <div id="passwordDisplay" style="display: flex; gap: 10px; margin-left: 10px;"></div>
    </div>

    <button onclick="resetPassword()">Reset</button>
  </div>

  <script>
    // List of icons with their names and corresponding image file names
    const icons = [
      { name: "book", file: "book.png" },
      { name: "balloon", file: "balloon.png" },
      { name: "rail", file: "rail.png" },
      { name: "alex", file: "alex.png" },
      { name: "cookie", file: "cookie.png" },
      { name: "fish", file: "fish.png" },
      { name: "helper", file: "helper.png" },
      { name: "cake", file: "cake.png" },
      { name: "pickaxe", file: "pickaxe.png" },
      { name: "water bucket", file: "water_bucket.png" },
      { name: "steve", file: "steve.png" },
      { name: "apple", file: "apple.png" },
      { name: "carrot", file: "carrot.png" },
      { name: "panda", file: "panda.png" },
      { name: "sign", file: "sign.png" },
      { name: "potion", file: "potion.png" },
      { name: "map", file: "map.png" },
      { name: "llama", file: "llama.png" }
    ];

    const selectedIcons = [];
    const maxPasswordLength = 4;

    function loadIcons() {
      const grid = document.getElementById('iconGrid');
      icons.forEach(icon => {
        const img = document.createElement('img');
        img.src = icon.file; // Images are in the same folder as index.html
        img.alt = icon.name;
        img.className = 'icon';
        img.onclick = () => selectIcon(icon);
        grid.appendChild(img);
      });
    }

    function selectIcon(icon) {
      if (selectedIcons.length < maxPasswordLength) {
        selectedIcons.push(icon);
        updatePasswordDisplay();
      }
    }

    function updatePasswordDisplay() {
      const display = document.getElementById('passwordDisplay');
      display.innerHTML = selectedIcons
        .map(icon => `<img src="${icon.file}" alt="${icon.name}" width="40">`)
        .join('');
    }

    function resetPassword() {
      selectedIcons.length = 0;
      updatePasswordDisplay();
    }

    window.onload = loadIcons;
  </script>
</body>
</html>
